<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch Video</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- POPUNDER -->
<script src="https://pl29285077.profitablecpmratenetwork.com/6d/17/3e/6d173e6234b165360c677a20d484832a.js"></script>

<!-- SOCIAL BAR -->
<script src="https://pl29285078.profitablecpmratenetwork.com/c3/36/36/c3363663e552aa5f7b3efa50c32246d2.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

header{
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
  background:#020617;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.video-wrapper{
  width:800px;
  max-width:95%;
  aspect-ratio:16/9;
  background:#000;
  border-radius:15px;
  overflow:hidden;
  position:relative;
}

video{
  width:100%;
  height:100%;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  text-align:center;
  padding:20px;
}

.hidden{
  display:none;
}

.actions{
  margin-top:20px;
}

.cta-btn{
  padding:14px 28px;
  background:#7c3aed;
  color:#fff;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
  font-size:16px;
}
</style>
</head>

<body>

<header>Videy</header>

<div class="main">

  <div class="video-wrapper">
    <!-- VIDEO SUDAH DI FIX -->
    <video id="video" controls playsinline muted preload="auto"></video>

    <div class="overlay" id="overlay">
      Klik play lalu tekan tombol di bawah untuk menonton penuh
    </div>
  </div>

  <div class="actions">
    <a href="#" class="cta-btn" id="unlock">Watch Full Video</a>
  </div>

</div>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");

// ===============================
// 🎬 VIDEO (SUDAH DIPERBAIKI)
// ===============================
video.src = "https://cdn.videy.co/TyXjR4sK1.mp4";

video.muted = true;
video.playsInline = true;

// force load & play kalau bisa
video.addEventListener("loadeddata", () => {
  video.play().catch(()=>{});
});


// ===============================
// 💰 SMARTLINK
// ===============================
const SMART = "https://www.profitablecpmratenetwork.com/rnu9b9ppc?key=67f44d6e6718f67e45a7b035627bd104";


// ===============================
// 💥 TRIGGER KLIK (1x saja)
// ===============================
let clicked = false;

video.addEventListener("play", function(){
  if(!clicked){
    clicked = true;
    window.open(SMART, "_blank");
  }
});


// ===============================
// 💰 CTA BUTTON
// ===============================
document.getElementById("unlock").onclick = function(e){
  e.preventDefault();
  window.open(SMART, "_blank");
};


// ===============================
// 🔥 DELAY HALUS
// ===============================
setTimeout(()=>{
  video.pause();
  overlay.classList.remove("hidden");
}, 8000);


// sembunyikan overlay saat play lagi
video.addEventListener("play", ()=>{
  overlay.classList.add("hidden");
});

</script>

</body>
</html>
